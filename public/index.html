<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>konatachat</title>
</head>
<body id="container">
    <header id="header">
        <div class="name-header">
            <a href="index.html" class="remove-style"><span class="boxed logo">konatachat</span></a>
        </div>
        <!-- <nav id="nav">

        </nav> -->
    </header>
    <main id="main">
        <div id="chat">
            <div class="tab-list">
                <ul>
                    <li><a href="#"><span class="highlight">#general</span></a></li>
                </ul>
            </div>
            <div class="chat-log">
                <div class="messages"></div>
            </div>
            <div class="input-field">
                <input type="text" id="message-input" placeholder="#general">
                <button id="send-button">Sen</button>
            </div>
        </div>
        <div id="sidebar">
            <div class="login-form">
                <h2>Sign in (Coming Soon)</h2>

                <div class="username">
                    <label for="id">konatachat ID</label>
                    <input type="text" id="id" placeholder="id" required>
                </div>

                <div class="password">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="password" required>
                </div>

                <div class="buttons">
                    <button type="submit" class="login-btn">Sign in</button>
                    <input type="checkbox" name="staySignedIn" id="staySignedIn">
                    Stay signed in? .3
                </div>

                <label for="signup">Dont have an account?<br><a href="#">Sign up here</a></label>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
